# Custom Keyboard Shortcuts Example
# Copy relevant sections to ~/.config/corgiterm/config.toml.
#
# CorgiTerm supports modifiers plus one key, such as Ctrl+Shift+H.
# Prefix or sequence bindings such as Ctrl+X+T or Ctrl+B+C are not supported.

# ============================================================================
# Example 1: Pane-heavy workflow
# ============================================================================
[keybindings.shortcuts]
focus_next_pane = "Alt+Right"
focus_prev_pane = "Alt+Left"
split_horizontal = "Alt+H"
split_vertical = "Alt+D"
close_pane = "Alt+W"

# ============================================================================
# Example 2: macOS-style
# ============================================================================
# Use "Super" for the Windows/Command key.
#
# [keybindings.shortcuts]
# new_tab = "Super+T"
# close_tab = "Super+W"
# next_tab = "Super+Shift+]"
# prev_tab = "Super+Shift+["
# new_document_tab = "Super+N"
# open_file = "Super+O"
# quick_switcher = "Super+K"
# toggle_ai = "Super+Shift+A"
# toggle_sidebar = "Super+Shift+B"
# ssh_manager = "Super+Shift+S"
# quit = "Super+Q"

# ============================================================================
# Example 3: Windows/Linux desktop-style
# ============================================================================
# [keybindings.shortcuts]
# new_tab = "Ctrl+T"
# close_tab = "Ctrl+W"
# new_document_tab = "Ctrl+N"
# open_file = "Ctrl+O"
# quit = "Alt+F4"
# next_tab = "Ctrl+PageDown"
# prev_tab = "Ctrl+PageUp"
# switch_to_tab_1 = "Alt+1"
# switch_to_tab_2 = "Alt+2"
# switch_to_tab_3 = "Alt+3"
# switch_to_tab_4 = "Alt+4"
# switch_to_tab_5 = "Alt+5"
# switch_to_tab_6 = "Alt+6"
# switch_to_tab_7 = "Alt+7"
# switch_to_tab_8 = "Alt+8"
# switch_to_tab_9 = "Alt+9"

# ============================================================================
# Example 4: Minimal shortcuts
# ============================================================================
# [keybindings.shortcuts]
# new_tab = "Ctrl+T"
# close_tab = "Ctrl+W"
# quit = "Ctrl+Q"
#
# # Disable optional shortcuts.
# quick_switcher = ""
# ssh_manager = ""
# toggle_ai = ""
# toggle_sidebar = ""
# snippets = ""
# ascii_art = ""
# history_search = ""
# split_horizontal = ""
# split_vertical = ""
# close_pane = ""
# new_document_tab = ""
