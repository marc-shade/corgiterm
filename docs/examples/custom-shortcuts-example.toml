# ============================================================================
# Example 6: Left-hand only
# ============================================================================
# [keybindings.shortcuts]
# new_tab = "Ctrl+T"
# close_tab = "Ctrl+W"
# next_tab = "Ctrl+E"
# prev_tab = "Ctrl+Q"
# split_horizontal = "Ctrl+R"
# split_vertical = "Ctrl+D"
# close_pane = "Ctrl+X"
# quick_switcher = "Ctrl+Space"
# toggle_ai = "Ctrl+A"

# ============================================================================
# Tips
# ============================================================================
#
# 1. Avoid conflicts with terminal programs:
#    - Do not use Ctrl+C, Ctrl+Z, or Ctrl+D for app shortcuts you expect inside a shell.
#    - Be careful with Ctrl+A and Ctrl+E because many shells use readline bindings.
#
# 2. Prefer related shortcuts:
#    - Keep tab actions together.
#    - Keep pane actions together.
#    - Use the same modifier family for similar actions.
#
# 3. Validate in Preferences:
#    - Preferences > Keybindings marks invalid shortcut labels before saving.
#    - Reset All Shortcuts restores the defaults.
