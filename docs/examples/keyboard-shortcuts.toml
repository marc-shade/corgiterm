# Example Keyboard Shortcuts Configuration for CorgiTerm
# Place overrides in ~/.config/corgiterm/config.toml

[keybindings.shortcuts]

# Tabs
new_tab = "Ctrl+T"
close_tab = "Ctrl+W"
next_tab = "Ctrl+Tab"
prev_tab = "Ctrl+Shift+Tab"
new_document_tab = "Ctrl+O"
switch_to_tab_1 = "Ctrl+1"
switch_to_tab_2 = "Ctrl+2"
switch_to_tab_3 = "Ctrl+3"
switch_to_tab_4 = "Ctrl+4"
switch_to_tab_5 = "Ctrl+5"
switch_to_tab_6 = "Ctrl+6"
switch_to_tab_7 = "Ctrl+7"
switch_to_tab_8 = "Ctrl+8"
switch_to_tab_9 = "Ctrl+9"

# Panes
split_horizontal = "Ctrl+Shift+H"
split_vertical = "Ctrl+Shift+D"
close_pane = "Ctrl+Shift+W"
focus_next_pane = "Ctrl+Shift+]"
focus_prev_pane = "Ctrl+Shift+["

# Terminal
copy = "Ctrl+Shift+C"
paste = "Ctrl+Shift+V"
select_all = "Ctrl+Shift+A"
find_terminal = "Ctrl+Shift+F"
activate_hints = "Ctrl+Shift+U"
zoom_in = "Ctrl+Plus"
zoom_out = "Ctrl+Minus"
reset_zoom = "Ctrl+0"

# Tools and UI
toggle_ai = "Ctrl+Shift+A"
toggle_sidebar = "Ctrl+Shift+B"
quick_switcher = "Ctrl+K"
ssh_manager = "Ctrl+S"
snippets = "Ctrl+Shift+S"
ascii_art = "Ctrl+Shift+G"
open_file = "Ctrl+Shift+O"
history_search = "Ctrl+R"

# Application
quit = "Ctrl+Q"

# Alternative examples:
# new_tab = "Alt+T"
# close_tab = "Alt+W"
# split_horizontal = "Alt+H"
# split_vertical = "Alt+D"
# focus_next_pane = "Alt+Right"
# focus_prev_pane = "Alt+Left"
# quit = "Super+Q"

# Disable a shortcut by setting it to an empty string:
# quick_switcher = ""
